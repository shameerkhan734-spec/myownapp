apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
     containers:
       - name: myapp
         image: 889411661447.dkr.ecr.us-east-1.amazonaws.com/myapp:v1
         imagePullPolicy: Always

        ports:
        - containerPort: 3000
